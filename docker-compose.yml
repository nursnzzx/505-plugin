services:
  postgres:
    image: postgres:16-alpine
    container_name: kanttools_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanttools
      POSTGRES_PASSWORD: kanttools
      POSTGRES_DB: kanttools
    ports:
      - "5432:5432"
    volumes:
      - kanttools_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanttools"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kanttools_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - kanttools_redisdata:/data

volumes:
  kanttools_pgdata:
  kanttools_redisdata:
