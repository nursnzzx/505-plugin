# Render Blueprint — deploys the Nurse 505 Plugin backend (API + Telegram bot via webhook)
# as a single FREE web service. The bot runs in-process (ENABLE_BOT_WEBHOOK),
# so no separate worker is needed.
#
# After the service is live, set the dashboard-only vars (DATABASE_URL,
# TELEGRAM_BOT_TOKEN, TELEGRAM_WEBAPP_URL, CORS_ORIGINS, ADMIN_PASSWORD).

services:
  - type: web
    name: kanttools-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_BOT_WEBHOOK
        value: "true"
      - key: TELEGRAM_BOT_USERNAME
        value: ergeshv505_bot
      - key: ADMIN_EMAIL
        value: admin@kanttools.local
      - key: SUPPORT_URL
        value: https://t.me/ergeshv505_bot
      - key: COMMUNITY_URL
        value: https://t.me/ergeshv505_bot
      # Secrets generated by Render (no manual input needed):
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: LICENSE_SIGNING_SECRET
        generateValue: true
      # You set these in the Render dashboard (sync: false = prompt, not in repo):
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBAPP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
