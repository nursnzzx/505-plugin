# Render Blueprint — deploys the Nurse 505 Plugin platform:
#   1) Backend API + Telegram bot (webhook, in-process)
#   2) Next.js Mini App (web cabinet served over HTTPS — required by Telegram)
#
# After the blueprint is applied, fill the dashboard-only secrets:
#   • nurse505-api:  DATABASE_URL, TELEGRAM_BOT_TOKEN, ADMIN_PASSWORD
#   • nurse505-web:  (nothing — NEXT_PUBLIC_API_URL is auto-wired from the API service)
#
# TELEGRAM_WEBAPP_URL and CORS_ORIGINS are now auto-wired from the web service URL,
# so no manual copy-paste between the two services is needed.

services:
  # ───────────────────────────────────────────────────────────
  # 1) Backend API + Telegram bot
  # ───────────────────────────────────────────────────────────
  - type: web
    name: nurse505-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:deploy && npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_BOT_WEBHOOK
        value: "true"
      - key: TELEGRAM_BOT_USERNAME
        value: ergeshv505_bot
      - key: ADMIN_EMAIL
        value: admin@nurse505.local
      - key: SUPPORT_URL
        value: https://t.me/ergeshv505_bot
      - key: COMMUNITY_URL
        value: https://t.me/ergeshv505_bot
      # Auto-wired from the web service — no manual URL juggling.
      - key: TELEGRAM_WEBAPP_URL
        fromService:
          type: web
          name: nurse505-web
          property: host
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: nurse505-web
          property: host
      # Secrets generated by Render (no manual input needed):
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: LICENSE_SIGNING_SECRET
        generateValue: true
      # Set in the Render dashboard (sync: false = prompt, not stored in repo):
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # ───────────────────────────────────────────────────────────
  # 2) Next.js Mini App (personal cabinet)
  # ───────────────────────────────────────────────────────────
  - type: web
    name: nurse505-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Auto-wired from the API service — points at the live backend.
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nurse505-api
          property: host
